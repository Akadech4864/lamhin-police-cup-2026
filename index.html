<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LAMHIN POLICE CUP 2026 - Official Landing Page</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600;700&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root {
            --bg-main: #070b12;
            --bg-card: #0f1626;
            --bg-card-hover: #1e293b;
            --accent-gold: #fbbf24;
            --accent-blue: #3b82f6;
            --text-light: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: #1e293b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            scroll-behavior: smooth;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-light);
            font-family: 'Kanit', sans-serif;
            overflow-x: hidden;
            line-height: 1.6;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-main);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent-gold);
        }

        /* Navigation Bar */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(7, 11, 18, 0.85);
            backdrop-filter: blur(12px);
            z-index: 1000;
            border-bottom: 1px solid var(--border-color);
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            font-weight: 900;
            color: var(--text-light);
            text-decoration: none;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo img {
            height: 35px;
        }

        .logo span {
            color: var(--accent-gold);
        }

        .nav-links {
            display: flex;
            list-style: none;
            gap: 30px;
        }

        .nav-links a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 1rem;
            font-weight: 400;
            transition: color 0.3s;
        }

        .nav-links a:hover, .nav-links a.active {
            color: var(--accent-gold);
        }

        /* Hero Section */
        header {
            position: relative;
            min-height: 100vh;
            padding: 120px 5% 60px 5%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: radial-gradient(circle at center, rgba(30, 58, 138, 0.2) 0%, rgba(7, 11, 18, 1) 70%);
        }

        header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: linear-gradient(to bottom, rgba(7,11,12,0.1), var(--bg-main));
            z-index: 1;
        }

        .hero-content {
            position: relative;
            z-index: 2;
            max-width: 900px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .hero-logo {
            width: 140px;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 20px rgba(251, 191, 36, 0.4));
        }

        .hero-badge {
            display: inline-block;
            background: rgba(251, 191, 36, 0.1);
            border: 1px solid var(--accent-gold);
            color: var(--accent-gold);
            padding: 6px 16px;
            border-radius: 50px;
            font-size: 0.9rem;
            font-weight: 600;
            letter-spacing: 2px;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 4rem;
            font-weight: 900;
            line-height: 1.1;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: -1px;
        }

        h1 span {
            color: var(--accent-gold);
            display: block;
            font-size: 4.5rem;
            text-shadow: 0 0 30px rgba(251, 191, 36, 0.3);
        }

        .hero-subtitle {
            font-size: 1.25rem;
            color: var(--text-muted);
            margin-bottom: 40px;
            max-width: 700px;
            margin-left: auto;
            margin-right: auto;
        }

        /* Countdown Grid */
        .countdown-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            max-width: 600px;
            margin: 0 auto 40px auto;
        }

        .countdown-box {
            background: rgba(15, 22, 38, 0.6);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 20px 10px;
            backdrop-filter: blur(8px);
            position: relative;
            overflow: hidden;
        }

        .countdown-box::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: var(--accent-gold);
        }

        .time-num {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--text-light);
            display: block;
            line-height: 1;
            margin-bottom: 5px;
        }

        .time-label {
            font-size: 0.8rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .hero-buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 14px 32px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s;
            cursor: pointer;
        }

        .btn-primary {
            background: var(--accent-gold);
            color: #000;
        }

        .btn-primary:hover {
            background: #f59e0b;
            box-shadow: 0 0 20px rgba(251, 191, 36, 0.4);
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: transparent;
            color: var(--text-light);
            border: 1px solid var(--border-color);
        }

        .btn-secondary:hover {
            background: rgba(255,255,255,0.05);
            border-color: var(--text-muted);
            transform: translateY(-2px);
        }

        /* Section Layouts */
        section {
            padding: 100px 5%;
            max-width: 1400px;
            margin: 0 auto;
        }

        .section-header {
            text-align: center;
            margin-bottom: 60px;
        }

        .section-header h2 {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.5rem;
            text-transform: uppercase;
            margin-bottom: 15px;
            position: relative;
            display: inline-block;
        }

        .section-header h2::after {
            content: '';
            display: block;
            width: 60px;
            height: 4px;
            background: var(--accent-gold);
            margin: 10px auto 0 auto;
            border-radius: 2px;
        }

        .section-header p {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        /* Info Grid / Cards */
        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
        }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 40px 30px;
            transition: all 0.3s;
            position: relative;
        }

        .card:hover {
            transform: translateY(-5px);
            background: var(--bg-card-hover);
            border-color: rgba(251, 191, 36, 0.3);
        }

        .card-icon {
            font-size: 2.5rem;
            color: var(--accent-gold);
            margin-bottom: 25px;
        }

        .card h3 {
            font-size: 1.5rem;
            margin-bottom: 15px;
            color: var(--text-light);
        }

        /* Interactive Tabs Section */
        .interactive-box {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        .tab-menu {
            display: flex;
            background: rgba(0,0,0,0.2);
            border-bottom: 1px solid var(--border-color);
        }

        .tab-btn {
            flex: 1;
            padding: 20px;
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-family: 'Kanit', sans-serif;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
        }

        .tab-btn:hover {
            color: var(--text-light);
            background: rgba(255,255,255,0.02);
        }

        .tab-btn.active {
            color: var(--accent-gold);
            background: rgba(251, 191, 36, 0.05);
            position: relative;
        }

        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            width: 100%;
            height: 3px;
            background: var(--accent-gold);
        }

        .tab-content {
            padding: 40px;
            display: none;
        }

        .tab-content.active {
            display: block;
            animation: fadeIn 0.5s ease;
        }

        /* Interactive Timeline/Schedule Layout */
        .match-card {
            background: rgba(7, 11, 18, 0.5);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s;
        }

        .match-card:hover {
            border-color: var(--accent-blue);
            background: rgba(59, 130, 246, 0.05);
        }

        .match-info {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .match-tag {
            align-self: flex-start;
            font-size: 0.8rem;
            background: var(--accent-blue);
            color: #fff;
            padding: 3px 10px;
            border-radius: 4px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .match-teams {
            font-size: 1.4rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            margin-top: 5px;
        }

        .match-vs {
            color: var(--accent-gold);
            margin: 0 10px;
            font-family: 'Orbitron', sans-serif;
        }

        .match-time {
            font-size: 1.1rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Rules Layout */
        .rules-wrapper {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
        }

        .rule-list {
            list-style: none;
        }

        .rule-list li {
            position: relative;
            padding-left: 30px;
            margin-bottom: 20px;
            font-size: 1.1rem;
        }

        .rule-list li::before {
            content: '\f058';
            font-family: 'Font Awesome 5 Free';
            font-weight: 900;
            position: absolute;
            left: 0;
            top: 2px;
            color: var(--accent-gold);
        }

        .points-table {
            width: 100%;
            border-collapse: collapse;
            background: rgba(0,0,0,0.2);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border-color);
        }

        .points-table th, .points-table td {
            padding: 15px 20px;
            text-align: left;
        }

        .points-table th {
            background: rgba(255,255,255,0.02);
            color: var(--accent-gold);
            font-weight: 600;
            border-bottom: 1px solid var(--border-color);
        }

        .points-table td {
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .points-table tr:last-child td {
            border-bottom: none;
        }

        /* Interactive QR Fund Section */
